app = "schedulesmcp-mcp"
primary_region = "arn"
[build]
  dockerfile = "Dockerfile"
[env]
  MCP_PORT = "3002"
[[services]]
  internal_port = 3002
  protocol = "tcp"
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
  [[services.ports]]
    handlers = ["http"]
    port = 80
  [services.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150
  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
